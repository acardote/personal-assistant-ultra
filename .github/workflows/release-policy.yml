name: Release policy

# Per #107: cross-checks RELEASE.md ↔ release-policy.yaml and verifies every
# surface listed in the YAML actually exists on disk + is mentioned in the
# Markdown. Drift between the two documents fails the build.
#
# Lives ONLY at .github/workflows/release-policy.yml — repo CI, not seeded
# downstream into user vaults.

on:
  push:
    branches: [main]
    paths:
      - "RELEASE.md"
      - "release-policy.yaml"
      - "scripts/check-release-policy.py"
      - ".github/workflows/release-policy.yml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "RELEASE.md"
      - "release-policy.yaml"
      - "scripts/check-release-policy.py"
      - ".github/workflows/release-policy.yml"
      - ".github/workflows/**"
      - ".claude/skills/**"
      - ".claude/commands/**"
      - "tools/**"
      - "templates/**"
      - "kb/**"
      - "kb-templates/**"
      - "docs/**"
      - ".assistant.local.json.example"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Validate release-policy.yaml ↔ RELEASE.md
        run: scripts/check-release-policy.py
