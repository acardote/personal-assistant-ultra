# .bruno/config.toml
# Source of truth for Bruno Method configuration in this project.
# Generated by `/bruno init`. Edit by hand only with intent.

schema_version = 1
created_at = "2026-05-05"
# `created_by` stores a GitHub handle (or other non-PII identifier).
# Do not write personal email here — this file is committed to the repo.
# Optional: omit to inherit from `git config user.name` at evidence time.
created_by = "acardote"

[ir]
# canonical: github | beads | both
canonical = "github"
# required if canonical includes github
github_repo = "acardote/personal-assistant-ultra"

[discipline]
# Refuse `/bruno close` without a Reconciliation comment + matched verdict.
require_reconciliation = true
# Weight tiers that get adversarial linker pass (Move 4 + pr-reviewer/pr-challenger).
adversarial_review_for = ["heavy"]
